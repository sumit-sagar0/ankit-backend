# Spring Boot Application Properties
# =====================================
# Database Configuration
# =====================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/artistic_ankit_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:joker}

# =====================================
# JPA / Hibernate Configuration
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================
# Server Configuration
# =====================================
server.port=8080

# =====================================
# Application Name
# =====================================
spring.application.name=paintingstore

# =====================================
# File Upload Configuration
# =====================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Upload directory (paintings save hongi yahan)
app.upload.dir=uploads/paintings

# =====================================
# Razorpay Configuration
# =====================================
razorpay.key.id=rzp_test_placeholder
razorpay.key.secret=secret_placeholder
